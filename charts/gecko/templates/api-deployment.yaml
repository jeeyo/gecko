{{- $googleSecretName := .Values.google.existingSecret | default (printf "%s-google" (include "gecko.fullname" .)) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gecko.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "gecko.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "gecko.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gecko.serviceAccountName" . }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          {{- with .Values.api.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            {{- include "gecko.databaseUrlEnv" . | nindent 12 }}
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: WEB_ORIGIN
              value: {{ include "gecko.webOrigin" . | quote }}
            - name: DEFAULT_CURRENCY
              value: {{ .Values.api.env.defaultCurrency | quote }}
            - name: SESSION_SECRET
              value: {{ .Values.api.env.sessionSecret | quote }}
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: {{ $googleSecretName }}
                  key: {{ .Values.google.secretKeys.redirectUri }}
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $googleSecretName }}
                  key: {{ .Values.google.secretKeys.clientId }}
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $googleSecretName }}
                  key: {{ .Values.google.secretKeys.clientSecret }}
                  optional: true
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
