{{- if and .Values.postgres.cloudnativepg.enabled (not .Values.postgres.cloudnativepg.existingCluster) }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "gecko.cnpgClusterName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  instances: {{ .Values.postgres.cloudnativepg.instances }}
  {{- if .Values.postgres.cloudnativepg.imageName }}
  imageName: {{ .Values.postgres.cloudnativepg.imageName | quote }}
  {{- end }}
  bootstrap:
    initdb:
      database: {{ .Values.postgres.cloudnativepg.database | quote }}
      owner: {{ .Values.postgres.cloudnativepg.owner | quote }}
  storage:
    size: {{ .Values.postgres.cloudnativepg.storage | quote }}
    {{- if .Values.postgres.cloudnativepg.storageClassName }}
    storageClass: {{ .Values.postgres.cloudnativepg.storageClassName | quote }}
    {{- end }}
  # CNPG creates these secrets automatically:
  #   {{ include "gecko.cnpgClusterName" . }}-superuser   (superuser creds)
  #   {{ include "gecko.cnpgClusterName" . }}-app         (app user creds + uri)
  {{- with .Values.postgres.cloudnativepg.clusterSpec }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
