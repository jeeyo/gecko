{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gecko.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Route /api/* to the API service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "gecko.fullname" . }}-api
                port:
                  name: http
          # Route everything else to the web SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "gecko.fullname" . }}-web
                port:
                  name: http
{{- end }}
