{{- if .Values.postgres.bundled.enabled }}
{{- $fullname := include "gecko.fullname" . }}
{{- $secretName := printf "%s-postgres" $fullname }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- if $existingSecret }}
  {{- $password = index $existingSecret.data "POSTGRES_PASSWORD" | b64dec }}
{{- else }}
  {{- $password = .Values.postgres.bundled.password | default (randAlphaNum 32) }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $password | quote }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s-postgres:5432/%s" .Values.postgres.bundled.user $password $fullname .Values.postgres.bundled.database | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "gecko.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ $fullname }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gecko.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gecko.name" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgres.bundled.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.bundled.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.bundled.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-postgres
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.bundled.user | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.bundled.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- with .Values.postgres.bundled.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.bundled.storageClassName }}
        storageClassName: {{ .Values.postgres.bundled.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.bundled.storage | quote }}
{{- end }}
