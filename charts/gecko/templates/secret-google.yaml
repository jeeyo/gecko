{{- if not .Values.google.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gecko.fullname" . }}-google
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
  annotations:
    # Keep the secret across helm upgrades so stored OAuth tokens are not wiped.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  {{ .Values.google.secretKeys.clientId }}: {{ .Values.google.clientId | quote }}
  {{ .Values.google.secretKeys.clientSecret }}: {{ .Values.google.clientSecret | quote }}
  {{ .Values.google.secretKeys.redirectUri }}: {{ include "gecko.googleRedirectUri" . | quote }}
{{- end }}
