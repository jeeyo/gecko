apiVersion: v1
kind: Service
metadata:
  name: {{ include "gecko.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gecko.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gecko.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
